<section id="projects" style="overflow: hidden;">
  <!-- Decorators -->
  <div class="decor-circle" style="top: 15%; right: 20%; width: 60px; height: 60px;"></div>
  <div class="decor-plus" style="top: 60%; left: 8%;"></div>
  <div class="decor-line" style="bottom: 20%; right: -50px; width: 200px;"></div>
  <div class="section-label reveal">Work</div>
  <h2 class="section-title reveal">Portafolio<br />Técnico</h2>

  <div class="projects-grid">
    <a
      *ngFor="let project of projects; let i = index"
      [routerLink]="['/proyectos', project.id]"
      class="project-card reveal"
      style="text-decoration: none; color: inherit"
    >
      <div class="project-num">0{{ i + 1 }} / {{ project.category }}</div>
      <h3 class="project-title">{{ project.title }}</h3>
      <p class="project-desc">
        {{ project.shortDescription }}
      </p>
      <div class="project-tags">
        <span *ngFor="let tag of project.tags" class="project-tag">{{ tag }}</span>
      </div>
    </a>
  </div>

  <div style="text-align: center; margin-top: 3rem" class="reveal">
    <a
      routerLink="/proyectos"
      class="btn-primary"
      style="display: inline-block; border-radius: 30px; text-decoration: none; cursor: none"
      ><span>Ver Todos los Proyectos</span></a
    >
  </div>
</section>
